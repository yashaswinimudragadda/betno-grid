<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Bento grid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body  class="bg-light">
  <main>
    <div class="container  my-5">
      <div class="row d-flex flex-column gap-0">
        <!--------box1-->
       <div class="col-lg-3 d-flex flex-column  py-5">
        <div class="card p-5 bg-yellow-100 border-0 ">
         <h3 class="fs-1 fw-semibold">Create and Schedule Content <span class="text-purple-500">quicker.</span> </h3>
         <img src="./assets/images/illustration-create-post.webp" alt="Create post" class="img-fluid mt-auto">
        </div>
       </div>
       <!-------down one-->
       <div class="col-lg-3 d-flex flex-row py-5 ">
         <div class="card p-5 bg-yellow-500 border-0 ">
          <h3>Write your content using AI.</h3>
          <img src="./assets/images/illustration-ai-content.webp" alt="AI content" class="img-fluid mt-auto">
         </div>
       </div>
      </div>


      <!----------grid1 -->
      <div class="container my-5">
        <div class="row d-flex flex-colunm gap-0">
        <div class="col-lg-3"></div>
        <div class="col-lg-3 d-flex flex-column  p-5">
          <div class="row d-flex flex-row">
            <div class="col-lg-3">
              <div class="card p-4 bg-white border-0">
                <h2 class="display-6 fw-bold">>56%</h2>
                <p>faster audience growth</p>
                <img src="./assets/images/illustration-audience-growth.webp" alt="Growth" class="img-fluid">
              </div>
            
            </div>
            <div class="col-lg-3 d-flex flex-column  p-5">
              <div class="card p-5 border border-0 bg-purple-500 text-white border-0 d-flex flex-row align-items-center">
                <img src="./assets/images/illustration-grow-followers.webp" alt="Followers" class="img-fluid w-50">
                <h3 class="ms-3">Grow followers with non-stop content.</h3>
              </div>
            </div>
          </div>
        </div>
        </div>
      </div>
     
  </main>

</body>
</html>
